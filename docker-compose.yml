services:

  sqlserver:
    build:
      context: ./database
    container_name: inventory_db
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "Admin@admin1"
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Admin@admin1", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: inventory_api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=InventoryDB;User Id=sa;Password=Admin@admin1;TrustServerCertificate=True"
      Jwt__Key: "S3cur3K3y_Inv3nt0rySystem_2024!@#$$%^&*()_+"
      Jwt__Issuer: "InventoryAPI"
      Jwt__Audience: "InventoryClient"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: inventory_web
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: "http://localhost:5000"
    depends_on:
      - backend

volumes:
  sqlserver_data:
